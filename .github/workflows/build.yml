name: Build BDSLM Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux:
    # Debian 12 has glibc 2.36 — too new for older servers
    # Use a manylinux-style approach: compile on ubuntu-22.04 but link against older glibc
    # Actually, let's use the same approach as Endstone: just build on ubuntu-22.04
    # The real fix is to ensure the server has compatible glibc, or we static-link everything
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Install Clang/LLVM
      run: |
        sudo apt-get update -y -q
        sudo apt-get install -y -q build-essential lsb-release wget software-properties-common gnupg
        sudo wget https://apt.llvm.org/llvm.sh
        sudo chmod +x llvm.sh
        sudo ./llvm.sh 20
        sudo apt-get install -y -q libc++-20-dev libc++abi-20-dev
        sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-20 200
        sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-20 200
        sudo update-alternatives --install /usr/bin/ld ld /usr/bin/ld.lld-20 100

    - name: Install Ninja
      run: sudo apt-get install -y ninja-build

    - name: Install OpenSSL & Brotli static libs
      run: sudo apt-get install -y libssl-dev libbrotli-dev

    - name: Configure CMake
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_C_COMPILER=clang \
          -DCMAKE_CXX_COMPILER=clang++ \
          -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
          -DOPENSSL_USE_STATIC_LIBS=ON

    - name: Build
      run: cmake --build build --config Release

    - name: Check dynamic deps
      run: |
        echo "=== ldd output ==="
        ldd build/endstone_bdslm.so || true
        echo "=== GLIBC requirements ==="
        objdump -T build/endstone_bdslm.so | grep GLIBC | sed 's/.*GLIBC_//' | sort -V -u | tail -5

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: endstone_bdslm_linux
        path: build/endstone_bdslm.so
        if-no-files-found: warn

  build-windows:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4

    - uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x86_64

    - name: Install LLVM (clang-cl)
      run: choco install llvm -y

    - name: Install CMake 3.29+
      uses: lukka/get-cmake@latest

    - name: Install OpenSSL
      run: choco install openssl -y

    - name: Configure CMake
      run: cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl

    - name: Build
      run: cmake --build build --config Release

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: endstone_bdslm_windows
        path: build/endstone_bdslm.dll
        if-no-files-found: warn