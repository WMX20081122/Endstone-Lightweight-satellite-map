name: Build BDSLM Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 libc++-18-dev libc++abi-18-dev ninja-build

      - name: Configure
        run: |
          mkdir build && cd build
          CC=clang-18 CXX=clang++-18 cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++"

      - name: Build
        run: |
          cd build
          ninja

      - name: Upload artifact (Linux)
        uses: actions/upload-artifact@v4
        with:
          name: endstone_bdslm-linux
          path: build/libendstone_bdslm.so

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cd build
          cmake --build . --config Release

      - name: Upload artifact (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: endstone_bdslm-windows
          path: build/Release/endstone_bdslm.dll
